version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "11:00"
      timezone: Europe/Athens
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    versioning-strategy: increase
    # This repo installs with npm, which has no minimum-release-age equivalent,
    # so cooldown is the only release-age gate. Keep it >= 2 days.
    cooldown:
      default-days: 2
      exclude:
        - "@gethinode/*" # our own packages ship without delay
